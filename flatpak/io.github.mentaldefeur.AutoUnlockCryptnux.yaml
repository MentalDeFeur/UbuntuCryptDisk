app-id: io.github.mentaldefeur.AutoUnlockCryptnux
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: auto-unlock-cryptnux-gui

# Accès au système hôte requis pour tpm2-tools, clevis, cryptsetup
finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --device=all
  - --filesystem=host
  - --system-talk-name=org.freedesktop.DBus.System
  - --talk-name=org.freedesktop.Notifications

modules:
  # PyQt5 via pip (Python 3.12 est inclus dans le runtime freedesktop 24.08)
  - name: python3-pyqt5
    buildsystem: simple
    build-options:
      build-args:
        - --share=network
    build-commands:
      - pip3 install --no-build-isolation --prefix=/app PyQt5

  # Application
  - name: auto-unlock-cryptnux
    buildsystem: simple
    build-commands:
      - install -Dm644 auto_unlock_cryptnux.py
          /app/lib/auto-unlock-cryptnux/auto_unlock_cryptnux.py
      - install -Dm644 auto_unlock_cryptnux_gui.py
          /app/lib/auto-unlock-cryptnux/auto_unlock_cryptnux_gui.py
      - install -Dm755 flatpak/wrapper-cli.sh /app/bin/auto-unlock-cryptnux
      - install -Dm755 flatpak/wrapper-gui.sh /app/bin/auto-unlock-cryptnux-gui
      - install -Dm644 flatpak/io.github.mentaldefeur.AutoUnlockCryptnux.desktop
          /app/share/applications/io.github.mentaldefeur.AutoUnlockCryptnux.desktop
      - install -Dm644 flatpak/io.github.mentaldefeur.AutoUnlockCryptnux.metainfo.xml
          /app/share/metainfo/io.github.mentaldefeur.AutoUnlockCryptnux.metainfo.xml
    sources:
      - type: dir
        path: ..
